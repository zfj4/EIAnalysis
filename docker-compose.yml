services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: eianalysis
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d eianalysis"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "9000:9000"
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
