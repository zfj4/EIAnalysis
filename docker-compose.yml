services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: eianalysis
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d eianalysis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
