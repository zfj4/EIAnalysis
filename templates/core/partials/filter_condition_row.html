<div id="condition-{{ index }}" class="space-y-4{% if index != '0' %} border-t border-[#AECDE8] pt-4{% endif %}">

  {% if index != '0' %}
  <p class="text-xs font-semibold text-[#E0A07A] uppercase tracking-wider">— or —</p>
  {% endif %}

  <div>
    <label class="block text-sm font-medium text-[#003B6F] mb-1">Variable</label>
    <select
      name="variable"
      hx-get="{% url 'core:filter_options' %}"
      hx-vals='{"index": "{{ index }}"}'
      hx-target="#filter-dynamic-{{ index }}"
      hx-trigger="change"
      class="block w-full rounded-md border border-[#AECDE8] bg-white px-3 py-2
             text-sm shadow-sm focus:border-[#318CE7] focus:ring-1 focus:ring-[#318CE7]"
    >
      <option value="">— select —</option>
      {% for col in columns %}
      <option value="{{ col }}">{{ col }}</option>
      {% endfor %}
    </select>
  </div>

  <div id="filter-dynamic-{{ index }}"></div>

</div>
