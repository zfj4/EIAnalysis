<div class="space-y-4 border-t border-[#AECDE8] pt-4">

  <div>
    <label class="block text-sm font-medium text-[#003B6F] mb-1">Expression</label>
    <input
      name="expression"
      type="text"
      required
      placeholder="e.g. ChefSalad = True OR EggSaladSandwich = True"
      class="block w-full rounded-md border border-[#AECDE8] bg-white px-3 py-2
             text-sm shadow-sm focus:border-[#318CE7] focus:ring-1 focus:ring-[#318CE7]"
    >
    <p class="mt-2 text-xs text-[#318CE7] space-y-0.5">
      Arithmetic: <span class="font-mono">+&nbsp;&nbsp;-&nbsp;&nbsp;*&nbsp;&nbsp;/</span>
      &nbsp;&nbsp;&nbsp;
      Logical: <span class="font-mono">AND&nbsp;&nbsp;OR&nbsp;&nbsp;NOT&nbsp;&nbsp;=&nbsp;&nbsp;!=&nbsp;&nbsp;&lt;&nbsp;&nbsp;&lt;=&nbsp;&nbsp;&gt;&nbsp;&nbsp;&gt;=</span>
    </p>
    <p class="mt-1 text-xs text-[#318CE7]">
      Variable names are case-sensitive. String literals must be in quotes.
    </p>
  </div>

</div>
