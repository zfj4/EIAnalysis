<div class="max-w-lg space-y-6">
  <h2 class="text-xl font-semibold">Log-Binomial Regression</h2>

  <form
    hx-post="{% url 'core:run_logbinomial' %}"
    hx-target="#analysis-panel"
    hx-swap="innerHTML show:#analysis-panel:top"
    hx-indicator="#logbinomial-spinner"
    class="space-y-6"
  >
    {% csrf_token %}

    <!-- Outcome Variable -->
    <div>
      <label for="lb_outcome_variable" class="block text-sm font-medium text-[#318CE7] mb-1">
        Outcome Variable
      </label>
      <select
        id="lb_outcome_variable"
        name="outcome_variable"
        required
        class="block w-full rounded-md border border-[#AECDE8] bg-white px-3 py-2
               text-sm shadow-sm focus:border-[#003B6F] focus:ring-1 focus:ring-[#003B6F]"
      >
        <option value="">— select —</option>
        {% for col in columns %}
        <option value="{{ col }}">{{ col }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Exposure Variables -->
    <div>
      <fieldset>
        <legend class="block text-sm font-medium text-[#318CE7] mb-2">
          Exposure Variables <span class="font-normal">(select one or more)</span>
        </legend>
        <div class="space-y-2 max-h-48 overflow-y-auto border border-[#AECDE8] rounded-md p-3 bg-white">
          {% for col in columns %}
          <label class="flex items-center gap-2 text-sm text-[#318CE7] cursor-pointer">
            <input
              type="checkbox"
              name="exposure_variables"
              value="{{ col }}"
              class="rounded border-gray-300 text-[#003B6F] focus:ring-[#003B6F]"
            >
            {{ col }}
          </label>
          {% endfor %}
        </div>
      </fieldset>
    </div>

    <!-- Interaction Variables (optional) -->
    <div>
      <fieldset>
        <legend class="block text-sm font-medium text-[#318CE7] mb-2">
          Interaction Variables <span class="font-normal">(optional — select two or more from your chosen exposures)</span>
        </legend>
        <div class="space-y-2 max-h-48 overflow-y-auto border border-[#AECDE8] rounded-md p-3 bg-white">
          {% for col in columns %}
          <label class="flex items-center gap-2 text-sm text-[#318CE7] cursor-pointer">
            <input
              type="checkbox"
              name="interaction_variables"
              value="{{ col }}"
              class="rounded border-gray-300 text-[#003B6F] focus:ring-[#003B6F]"
            >
            {{ col }}
          </label>
          {% endfor %}
        </div>
      </fieldset>
    </div>

    <button
      type="submit"
      class="inline-flex items-center gap-2 px-5 py-2 bg-[#E0A07A] text-white
             text-sm font-semibold rounded-md hover:bg-[#C07D55] transition-colors"
    >
      <span id="logbinomial-spinner" class="htmx-indicator">
        <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
      </span>
      Run Analysis
    </button>
  </form>
</div>
