<div class="max-w-lg space-y-6">
  <h2 class="text-xl font-semibold text-blue-900">Means Analysis</h2>

  <form
    hx-post="{% url 'core:run_means' %}"
    hx-target="#analysis-panel"
    hx-swap="innerHTML show:#analysis-panel:top"
    hx-indicator="#means-spinner"
    class="space-y-6"
  >
    {% csrf_token %}

    <!-- Means Of Variable -->
    <div>
      <label for="means_variable" class="block text-sm font-medium text-blue-900 mb-1">
        Means Of
      </label>
      <select
        id="means_variable"
        name="means_variable"
        required
        class="block w-full rounded-md border border-blue-200 bg-white px-3 py-2
               text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
      >
        <option value="">— select —</option>
        {% for col in columns %}
        <option value="{{ col }}">{{ col }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Cross-tabulate Variable (optional) -->
    <div>
      <label for="crosstab_variable" class="block text-sm font-medium text-blue-900 mb-1">
        Cross-tabulate <span class="text-blue-400 font-normal">(optional)</span>
      </label>
      <select
        id="crosstab_variable"
        name="crosstab_variable"
        class="block w-full rounded-md border border-blue-200 bg-white px-3 py-2
               text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
      >
        <option value="">— none —</option>
        {% for col in columns %}
        <option value="{{ col }}">{{ col }}</option>
        {% endfor %}
      </select>
    </div>

    <button
      type="submit"
      class="inline-flex items-center gap-2 px-5 py-2 bg-amber-700 text-white
             text-sm font-semibold rounded-md hover:bg-amber-800 transition-colors"
    >
      <span id="means-spinner" class="htmx-indicator">
        <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
      </span>
      Run Analysis
    </button>
  </form>
</div>
