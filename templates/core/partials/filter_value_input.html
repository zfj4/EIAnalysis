{% if show_input %}
<div>
  <label class="block text-sm font-medium text-[#003B6F] mb-1">Value</label>
  {% if use_select %}
  <select
    name="value"
    required
    class="block w-full rounded-md border border-[#AECDE8] bg-white px-3 py-2
           text-sm shadow-sm focus:border-[#318CE7] focus:ring-1 focus:ring-[#318CE7]"
  >
    {% for v in unique_vals %}
    <option value="{{ v }}">{{ v }}</option>
    {% endfor %}
  </select>
  {% else %}
  <input
    name="value"
    type="text"
    required
    class="block w-full rounded-md border border-[#AECDE8] bg-white px-3 py-2
           text-sm shadow-sm focus:border-[#318CE7] focus:ring-1 focus:ring-[#318CE7]"
  >
  {% endif %}
</div>
{% else %}
<input type="hidden" name="value" value="">
{% endif %}
