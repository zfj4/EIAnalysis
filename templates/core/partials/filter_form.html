<div class="max-w-lg space-y-6">
  <h2 class="text-xl font-semibold text-[#003B6F]">Filter Data</h2>

  {% if filters %}
  <div class="bg-[#BDD8F2] border border-[#AECDE8] rounded-lg p-4 space-y-2">
    <p class="text-xs font-semibold uppercase tracking-wider text-[#003B6F] mb-1">Active Filters</p>
    {% for f in filters %}
    <p class="text-sm text-[#003B6F]">
      <span class="font-mono font-semibold">{{ f.variable }}</span>
      <span> {{ f.operator_label }}</span>
      {% if f.value %}<span class="font-mono"> {{ f.value }}</span>{% endif %}
    </p>
    {% endfor %}
    <p class="text-sm font-medium text-[#318CE7]">{{ row_count }} rows in working dataset</p>
  </div>
  {% endif %}

  <form
    hx-post="{% url 'core:run_filter' %}"
    hx-target="#analysis-panel"
    hx-swap="innerHTML show:#analysis-panel:top"
    hx-indicator="#filter-spinner"
    class="space-y-4"
  >
    {% csrf_token %}

    <!-- Variable -->
    <div>
      <label for="filter-variable" class="block text-sm font-medium text-[#003B6F] mb-1">Variable</label>
      <select
        id="filter-variable"
        name="variable"
        required
        hx-get="{% url 'core:filter_options' %}"
        hx-target="#filter-dynamic"
        hx-trigger="change"
        class="block w-full rounded-md border border-[#AECDE8] bg-white px-3 py-2
               text-sm shadow-sm focus:border-[#318CE7] focus:ring-1 focus:ring-[#318CE7]"
      >
        <option value="">— select —</option>
        {% for col in columns %}
        <option value="{{ col }}">{{ col }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Operator + value loaded dynamically -->
    <div id="filter-dynamic"></div>

    <button
      type="submit"
      class="inline-flex items-center gap-2 px-5 py-2 bg-[#E0A07A] text-white border border-[#C07D55]
             text-sm font-semibold rounded-md hover:bg-[#C07D55] transition-colors"
    >
      <span id="filter-spinner" class="htmx-indicator">
        <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
      </span>
      Filter
    </button>
  </form>
</div>
