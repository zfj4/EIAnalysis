<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EIAnalysis</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX via CDN -->
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>

  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-flex; }
  </style>
</head>
<body class="bg-[#DCE9F5] text-gray-900 min-h-screen">

  {% load static %}
  <header class="bg-[#003B6F] shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <h1 class="text-2xl font-bold tracking-tight text-white">
        <button
          hx-get="{% url 'core:index' %}"
          hx-target="#main-content"
          hx-swap="innerHTML"
          hx-select="#main-content > *"
          class="hover:opacity-80 transition-opacity"
        >EIAnalysis</button>
      </h1>
      <a
        href="https://github.com/Epi-Info/epiinfo"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex items-center gap-2 mt-1 text-xs text-[#AECDE8] hover:text-white transition-colors"
      >
        Powered by epiinfo
        <img src="{% static 'images/ei_logo.png' %}" alt="epiinfo logo" class="h-4 w-auto">
      </a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- HTMX will swap content into this div -->
    <div id="main-content">
      {% include "core/partials/file_navigator.html" %}
    </div>
  </main>

  <script>
  (function () {
    function initSummarySort() {
      const table = document.getElementById('summary-table');
      if (!table) return;
      const tbody = table.querySelector('tbody');
      const headers = Array.from(table.querySelectorAll('.sort-header'));
      let sortCol = 0, sortAsc = true;

      function applySort(col) {
        const rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort((a, b) => {
          const aVal = a.querySelectorAll('td')[col].dataset.value;
          const bVal = b.querySelectorAll('td')[col].dataset.value;
          const aNum = parseFloat(aVal), bNum = parseFloat(bVal);
          const cmp = (!isNaN(aNum) && !isNaN(bNum))
            ? aNum - bNum
            : aVal.localeCompare(bVal, undefined, { sensitivity: 'base' });
          return sortAsc ? cmp : -cmp;
        });
        rows.forEach(r => tbody.appendChild(r));
        headers.forEach((th, i) => {
          th.querySelector('.sort-icon').textContent =
            i === col ? (sortAsc ? '↑' : '↓') : '↕';
        });
      }

      headers.forEach(th => {
        th.addEventListener('click', () => {
          const col = parseInt(th.dataset.col);
          if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
          applySort(sortCol);
        });
      });
    }

    document.body.addEventListener('htmx:afterSwap', initSummarySort);
  })();
  </script>
</body>
</html>
